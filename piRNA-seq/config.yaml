# Configuration file for piRNA-seq Snakemake workflow

genome:
  version: "dm6"
  species: "drosophila"
  fasta: "../Shared/DataFiles/genomes/{version}.fa"
  bowtie_index: "../Shared/DataFiles/genomes/bowtie-indexes/{version}"
  chrom_sizes: "../Shared/DataFiles/genomes/bowtie-indexes/{version}.chrom.sizes"
  # Luo 2025 piRNA-seq.md transposon windows (dm3). Override for other references or set to {}
  # to skip te_cluster_coverage / chop_te_bg4 rules.
  te_regions:
    # Note: deepTools 2.4.2 expects CHR:START:END (not CHR:START-END).
    "20A": "chrX:21392175:21431907"
    "42A": "chr2R:2144349:2386719"

sample:
  name: "pirna_sample"
  fastq: "../Shared/DataFiles/datasets/pirna-seq/pirna_sample.fastq.gz"

references:
  # Luo 2025 piRNA-seq.md maps to 42AB_UASG (not 42AB_UBIG used by ChIP/totalRNA in this repo).
  vector_index: "../Shared/DataFiles/genomes/YichengVectors/42AB_UASG"
  # Illumina TruSeq small RNA / documented in piRNA-seq.md
  adapter_sequence: "AGATCGGAAGAGCACACGTCT"

output:
  results_dir: "results"

analysis:
  # Luo 2025: extract 23–29 nt after adapter trim (piRNA-seq.md).
  min_read_length: 23
  max_read_length: 29
  # Filename token for genome/vector mapping outputs (default: "{min_read_length}_{max_read_length}").
  # Override for a different size branch, e.g. size_class: "21"
  # size_class: "23_29"
  threads: 8
  # Coverage/bedGraph outputs (bamCoverage + bedops/bedmap chop) are optional.
  # YiCheng comparison only requires BAMs, so default is off.
  emit_coverage: false
  # Luo shell pipeline names *unique.dup* BAMs after Bowtie -m 1 only; it does not add
  # samtools MAPQ filtering. Set true to drop MAPQ==0 for *.{size_class}.{genome}.genome.unique.bam and genome coverage.
  mapq_filter_unique: false
